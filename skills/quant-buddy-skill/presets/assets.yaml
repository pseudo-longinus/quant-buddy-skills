# ============================================================
# 常用资产预设【共 99 行，建议一次读完】
# 来源：MongoDB tkrsInfo 集合
# 关键：公式中必须用 name 字段，不能用 code
#   ✅ 收盘价(CMX-黄金)
#   ❌ 收盘价(GC.CMX)   ← assetNormalizer 会报错
#
# 格式：类别 | name（公式中使用此名） | code | 备注
#
# ── 目录 ─────────────────────────────────────────────────────
#   L14  index   宽基指数（沪深300 / 万得全A / 中证500…）
#   L24  future  商品期货（CMX-黄金 / 沪铜 / WTI原油…）
#   L34  forex   外汇（美元兑人民币）
#   L37  stock   A股个股（贵州茅台 / 宁德时代 / 比亚迪…）
#   L57  etf     ETF 基金（沪深300ETF / 黄金ETF …）
#   L73  hk      港股个股（腾讯控股 / 美团 / 小米…）
#   L82  us      美股个股（苹果 / 特斯拉 / 英伟达…）
#
# 股票代码格式：
#   A股-上交所: SH + 代码（如 SH600000）
#   A股-深交所: SZ + 代码（如 SZ000001）
#   港股:       HK + 代码（如 HK0001）
#   美股-NASDAQ: 代码.N（如 AAPL.N）
#   美股-NYSE:   代码.O（如 AAL.O）
#   美股-AMEX:   代码.A（如 SBE.A）
#
# ⚠️ 港股/美股目前仅支持行情价格数据（收盘/开盘/最高/最低/涨跌幅/成交量/成交额），
#    不支持估值（PE/PB/市值）和财务数据。
#
# 若此文件没有目标资产 → 调用 confirmMultipleAssets 获取
# ============================================================

